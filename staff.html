<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGHP1zInIv94yKym_nzpFrBRz6dtYwlps",
    authDomain: "wsair-f3c09.firebaseapp.com",
    projectId: "wsair-f3c09",
    storageBucket: "wsair-f3c09.firebasestorage.app",
    messagingSenderId: "712143874991",
    appId: "1:712143874991:web:3ca4c58de815c8cf421d5a",
    measurementId: "G-MWH2HGV7HD"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signOutAndRedirect = async function() {
    try {
      await signOut(auth);
      window.location.href = 'western-skies-air-live_1.html';
    } catch (error) {
      console.error('Sign out failed:', error);
    }
  };

  onAuthStateChanged(auth, user => {
    const signOutBtn = document.getElementById('signout-btn');
    if (signOutBtn) {
      signOutBtn.style.display = user ? 'inline-block' : 'none';
    }
  });
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold:#c8860a; --bg:#050d1a; --surface:#141414; --surface2:#1c1c1c; --border:rgba(255,255,255,0.07); --text:#fff; --muted:#888; }

nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:0 32px; height:64px; background:rgba(10,10,10,0.92); border-bottom:1px solid var(--border); backdrop-filter:blur(12px); }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:.12em; color:var(--text); text-decoration:none; }
.nav-logo span { color:var(--gold); }
.nav-actions { display:flex; gap:12px; align-items:center; }
.nav-cta { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); border:1px solid var(--gold); padding:8px 20px; text-decoration:none; transition:background .2s,color .2s; }
.nav-cta:hover { background:var(--gold); color:#000; }
.main { max-width:960px; margin:120px auto 80px; padding:0 24px; }

.hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,6vw,72px); line-height:1; margin-bottom:14px; }
.hero-sub { font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; }
.contact-grid { display:grid; grid-template-columns:1fr; gap:18px; }
.contact-card { background:var(--surface2); border:1px solid var(--border); padding:26px 28px; border-radius:18px; }
.contact-card h2 { font-family:'Bebas Neue',sans-serif; font-size:24px; margin-bottom:10px; }
.contact-card p { font-family:'Barlow',sans-serif; font-size:15px; color:var(--text); line-height:1.7; }
.contact-strong { color:var(--gold); }
@media (max-width:768px) { .main { margin-top:100px; } .hero-card { padding:28px; } }
</style>
</head>
